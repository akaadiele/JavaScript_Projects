<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie & Reviews</title>

    <!-- Icon -->
    <link rel="icon" href="./img/logo.ico">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Font Awesome CSS-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Roboto+Slab:wght@100..900&family=Smooch+Sans:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- Animate CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand active nav-title" href="index.html">Movies & Reviews</a>
            <form class="d-flex" role="search" id="search-form">
                <input class="form-control me-2 border border-3 rounded-3" type="search" placeholder="Search Movies..."
                    aria-label="Search" id="search-query" />
            </form>
        </div>
    </nav>


    <!-- Movie List Section -->
    <div class="container-fluid my-4">
        <div class="row g-4 d-flex justify-content-around" id="movie-section">

            <!-- Movie items will be dynamically added here -->

            <!-- Loading Screen -->
            <div id="loadingDiv" class="d-flex flex-column justify-content-center align-items-center">
                <img src="./img/loading.gif" alt="" id="loadingGif" style="height: 200px; width: 200px;">
                <h3 class="loadingText text-light mt-3">Fetching Movies...</h3>
            </div>
        </div>
    </div>


    <!-- Footer -->
    <div class="mt-5">
        <hr class="border border-light border-1 opacity-50">
        <footer class="mt-auto d-flex justify-content-center align-items-center">
            <p id="footerSign" class="text-white-50">Dev-by-Aka&trade;</p>
        </footer>
    </div>


    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>

</body>

</html>
