<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie & Reviews</title>

    <!-- Icon -->
    <link rel="icon" href="./img/logo.ico">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Font Awesome CSS-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Roboto+Slab:wght@100..900&family=Smooch+Sans:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand active nav-title" href="index.html">Movies & Reviews</a>
        </div>
    </nav>


    <!-- Movie Section -->
    <div class="container-fluid my-3 mx-auto px-3">
        <div class="d-flex justify-content-around row" id="movie-section">

            <!-- Movie Info -->
            <div class="card mb-3 bg-1" style="max-width: 50rem;">
                <div class="row g-0">
                    <div class="col-md-4">
                        <img src="" id="moviePoster" class="img-fluid rounded-start" alt="Movie Poster">
                    </div>
                    <div class="col-md-8">
                        <div class="card-body">
                            <h3 class="card-title" id="movieTitle">
                                <!-- Movie title will be inserted here -->
                                Movie Title
                            </h3>
                            <hr>
                            <p class="card-text" id="movieOverview">
                                <!-- Overview will be inserted here -->
                                Movie overview
                            </p>
                            <p class="card-text">
                                <small class="text-body-secondary" id="movieReleaseYear">
                                    <!-- Year will be inserted here -->
                                    Year of release
                                </small>
                            </p>

                            <hr>
                            <p>
                                <a href="#"
                                    class="link-primary link-offset-3 link-underline-opacity-50 link-underline-opacity-100-hover"
                                    id="imdbLink" target="_blank">Full Movie Details (IMDb)</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>


            <!-- Add a Review -->
            <div class="card text-center mb-3 bg-1" style="width: 20rem;">
                <div class="card-body">
                    <h5 class="card-title">Submit a review:</h5>

                    <hr>

                    <div class="form-control mb-3">
                        <label for="newRatingInput">
                            Rating: <small class="fst-italic">(click star to rate)</small>
                        </label>
                        <div id="newRatingInput">
                            <!-- Movie Rating Stars -->
                        </div>
                    </div>

                    <div class="form-floating mb-3">
                        <textarea class="form-control" placeholder="Leave a comment here" id="newReviewInput"
                            style="height: 150px;"></textarea>
                        <label for="newReviewInput"><em>Review:</em> </label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="newUserInput">
                        <label for="newUserInput"><em>Name:</em></label>
                    </div>

                    <a href="#" class="btn btn-primary"
                        onclick="saveReview('newReviewInput', 'newUserInput', 'newRatingInput')">
                        <i class="fa-regular fa-floppy-disk"> </i> Save
                    </a>
                </div>
            </div>

        </div>
    </div>


    <hr class="border border-light border-3 opacity-50">


    <!-- Reviews Section -->
    <div class="bg-dark my-3 mx-auto py-3">
        <h1 class="text-light text-center py-2 h1">Reviews</h1>

        <div class="container d-flex justify-content-center">
            <div class="row g-4 d-flex justify-content-around" id="reviews-section">
                <!-- Movie reviews will be dynamically added here -->
            </div>
        </div>
    </div>


    <!-- Footer -->
    <div class="mt-5">
        <hr class="border border-light border-1 opacity-50">
        <footer class="mt-auto d-flex justify-content-center align-items-center">
            <p id="footerSign" class="text-white-50">Dev-by-Aka&trade;</p>
        </footer>
    </div>


    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Custom JavaScript -->
    <script src="movie.js"></script>

</body>

</html>
