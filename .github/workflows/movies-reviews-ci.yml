name: Movies & Reviews CI Pipeline

on:
  push:
    branches: [main]
    paths:
      - Movies_Reviews/**
      - .github/workflows/movies-reviews-ci.yml
  pull_request:
    branches: [main]
    paths:
      - Movies_Reviews/**
      - .github/workflows/movies-reviews-ci.yml

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Movies_Reviews/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Movies_Reviews/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          PORT: ${{ secrets.PORT }}
          MONGODB_U: ${{ secrets.MONGODB_U }}
          MONGODB_P: ${{ secrets.MONGODB_P }}
          TMDB_K: ${{ secrets.TMDB_K }}
        run: npm test